apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    app: frontend
spec:
  # For Database generally should be in statefulset
  replicas: 1
  # selector used to identify which pods belongs to deployment
  selector:
    matchLabels:
      app: frontend
  # Definition of Pod
  template:
    metadata:
      # labels are key value pairs
      # pods will have different names, but will share label
      # common for apps to be app:appNae
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: viz-client:latest
          imagePullPolicy: Never
          ports:
            # Port that container listens on
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  # Default is ClusterIP (for internal Service)
  # requires a NodePort in ports
  type: NodePort
  # selector needed to forward request to endpoint pods
  # should match label for pod
  selector:
    app: frontend
  ports:
    - protocol: TCP
      # service port
      # common convention to use same ports
      port: 8080
      # port of the pods. container in pod listening on targetPort
      targetPort: 8080
      # exposes the service on each node's ip at a static port
      # other words: all worker nodes can access this service.
      # from centralized point (cluster)
      # Must be within range of 30000-32767
      nodePort: 30100
