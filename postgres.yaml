apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
  labels:
    app: postgres
spec:
  # For Database generally should be in statefulset
  replicas: 1
  # selector used to identify which pods belongs to deployment
  selector:
    matchLabels:
      app: postgres
  # Definition of Pod
  template:
    metadata:
      # labels are key value pairs
      # pods will have different names, but will share label
      # common for apps to be app:appNae
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  # name is secret file name
                  # key is key from that secret file
                  name: postgres-secret
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: postgres-password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: postgres-db-name
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
spec:
  # selector needed to forward request to endpoint pods
  # should match label for pod
  selector:
    app: postgres
  ports:
    - protocol: TCP
      # service port
      # common convention to use same ports
      port: 5432
      # port of the pods
      targetPort: 5432